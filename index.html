<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eyeサポテストメール</title>

<style>
body {
  margin: 0;
  font-family: "Hiragino Mincho ProN", serif;
  background: url("https://hirocon-net.jp/wp-content/themes/hirocon/images/page/shop/toyohashi_large.jpg") no-repeat center center/cover;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(6px);
}

.container {
  position: relative;
  z-index: 1;
  width: 92%;
  max-width: 420px;
  padding: 35px 22px;
  border-radius: 24px;
  background: linear-gradient(180deg, rgba(255,248,240,0.95), rgba(245,230,210,0.95));
  box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  text-align: center;
}

/* タイトル */
.title {
  font-size: 24px;
  color: #4a2f1a;
  margin-bottom: 10px;
}

/* サブ説明 */
.subtitle {
  font-size: 13px;
  color: #7a5a3a;
  margin-bottom: 20px;
}

/* メインボタン（超重要） */
.main-btn {
  display: block;
  margin: 18px 0;
  padding: 20px;
  border-radius: 16px;
  text-decoration: none;
  font-size: 18px;
  font-weight: bold;
  color: white;
  background: linear-gradient(135deg, #b9935a, #8c6a3d);
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* 補助ボタン */
.btn {
  display: block;
  margin: 8px 0;
  padding: 12px;
  border-radius: 10px;
  text-decoration: none;
  font-size: 14px;
  color: #3b2a1e;
  background: #f3e2cf;
}

/* 補足 */
.note {
  margin-top: 15px;
  font-size: 12px;
  color: #4a2f1a;
  line-height: 1.6;
}

/* 署名 */
.signature {
  position: fixed;
  bottom: 18px;
  right: 22px;
  color: rgba(255,255,255,0.9);
  font-size: 13px;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">メール確認</div>
  <div class="subtitle">下のボタンを押して、そのまま送信してください</div>

  </div>

  <!-- うまくいかない場合 -->
  <div class="subtitle" style="margin-top:20px;">うまく開かない場合はこちら</div>
