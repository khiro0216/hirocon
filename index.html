<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eyeサポテストメール</title>

<style>
body {
  margin: 0;
  font-family: "Hiragino Mincho ProN", serif;
  background: url("https://hirocon-net.jp/wp-content/themes/hirocon/images/page/shop/toyohashi_large.jpg") no-repeat center center/cover;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(6px);
}

.container {
  position: relative;
  z-index: 1;
  width: 92%;
  max-width: 420px;
  padding: 35px 22px;
  border-radius: 24px;
  background: linear-gradient(180deg, rgba(255,248,240,0.95), rgba(245,230,210,0.95));
  box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  text-align: center;
}

.title {
  font-size: 24px;
  color: #4a2f1a;
  letter-spacing: 2px;
  margin-bottom: 15px;
}

.section-title {
  font-size: 13px;
  color: #7a5a3a;
  margin: 18px 0 8px;
}

.btn {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px 0;
  padding: 14px;
  border-radius: 12px;
  text-decoration: none;
  font-size: 15px;
  color: #3b2a1e;
  background: linear-gradient(145deg, #fff8f0, #e9d7c2);
  box-shadow: 5px 5px 12px rgba(0,0,0,0.25),
              -3px -3px 8px rgba(255,255,255,0.8);
  cursor: pointer;
}

.arrow {
  opacity: 0.5;
}

.note {
  margin-top: 18px;
  font-size: 12px;
  color: #4a2f1a;
  line-height: 1.6;
}

.signature {
  position: fixed;
  bottom: 18px;
  right: 22px;
  color: rgba(255,255,255,0.9);
  font-size: 13px;
}
</style>

<script>
// 設定データ
const config = {
  to: "customer-desk@hirocon-net.co.jp",
  subject: "eyeサポテストメール",
  body: "レンズを使用される方のお名前（漢字）\n⇒\n\nこちらはメールアドレス確認用のメールでございます。\nお名前をご入力いただき、そのまま送信をお願いいたします。"
};

function openGmail() {
  const s = encodeURIComponent(config.subject);
  const b = encodeURIComponent(config.body);
  
  const app = `googlegmail://co?to=${config.to}&subject=${s}&body=${b}`;
  const web = `https://mail.google.com/mail/?view=cm&fs=1&to=${config.to}&su=${s}&body=${b}`;

  window.location.href = app;
  setTimeout(() => { window.location.href = web; }, 1000);
}

function openYahoo() {
  const s = encodeURIComponent(config.subject);
  const b = encodeURIComponent(config.body);

  // 日本版Yahoo!メールアプリの起動スキーム yjmail://
  const app = `yjmail://compose?to=${config.to}&subject=${s}&body=${b}`;
  // ブラウザ版URL
  const web = `https://compose.mail.yahoo.co.jp/?to=${config.to}&ss=${s}&body=${b}`;

  window.location.href = app;
  
  const start = Date.now();
  setTimeout(() => {
    // 1.5秒経っても画面が切り替わっていない場合にWeb版へ
    if (Date.now() - start < 2000) {
      window.location.href = web;
    }
  }, 1500);
}
</script>

</head>

<body>

<div class="container">

  <div class="title">eyeサポテストメール</div>

  <div class="section-title">メールアプリ</div>

  <a class="btn" href="mailto:customer-desk@hirocon-net.co.jp?subject=eyeサポテストメール&body=レンズを使用される方のお名前（漢字）%0A⇒%0A%0Aこちらはメールアドレス確認用のメールでございます。%0Aお名前をご入力いただき、そのまま送信をお願いいたします。">
    iPhone純正メール <span class="arrow">›</span>
  </a>

  <div class="btn" onclick="openGmail()">
    Gmail <span class="arrow">›</span>
  </div>

  <div class="btn" onclick="openYahoo()">
    Yahoo!メール <span class="arrow">›</span>
  </div>

  <a class="btn" href="https://outlook.live.com/mail/0/deeplink/compose?to=customer-desk@hirocon-net.co.jp&subject=eyeサポテストメール&body=レンズを使用される方のお名前（漢字）%0A⇒%0A%0Aこちらはメールアドレス確認用のメールでございます。%0Aお名前をご入力いただき、そのまま送信をお願いいたします。" target="_blank">
    Outlook <span class="arrow">›</span>
  </a>

  <div class="section-title">キャリアメール</div>

  <a class="btn" href="mailto:customer-desk@hirocon-net.co.jp?subject=eyeサポテストメール&body=レンズを使用される方のお名前（漢字）%0A⇒%0A%0Aこちらはメールアドレス確認用のメールでございます。%0Aお名前をご入力いただき、そのまま送信をお願いいたします。">
    ドコモメール <span class="arrow">›</span>
  </a>

  <a class="btn" href="mailto:customer-desk@hirocon-net.co.jp?subject=eyeサポテストメール&body=レンズを使用される方のお名前（漢字）%0A⇒%0A%0Aこちらはメールアドレス確認用のメールでございます。%0Aお名前をご入力いただき、そのまま送信をお願いいたします。">
    auメール <span class="arrow">›</span>
  </a>

  <a class="btn" href="mailto:customer-desk@hirocon-net.co.jp?subject=eyeサポテストメール&body=レンズを使用される方のお名前（漢字）%0A⇒%0A%0Aこちらはメールアドレス確認用のメールでございます。%0Aお名前をご入力いただき、そのまま送信をお願いいたします。">
    ソフトバンクメール <span class="arrow">›</span>
  </a>

  <div class="note">
    メールを作成いたします。件名・本文はあらかじめ入力されております。<br>
    お名前をご入力のうえ、そのまま送信をお願いいたします。
  </div>

</div>

<div class="signature">
  HIROCON 豊橋店
</div>

</body>
</html>
